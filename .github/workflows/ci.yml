name: Backend CI

on: [ push, pull_request ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agora_test
      SECRET_KEY: test
      R2_ACCOUNT_ID: test-account-id
      R2_ACCESS_KEY_ID: test-key-id
      R2_SECRET_ACCESS_KEY: test-secret
      R2_BUCKET_PRIVATE: test-private
      R2_BUCKET_PUBLIC: test-public

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Show uv version
        run: uv --version

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint and Format
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Tests with Coverage
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=80